<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./api.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #fafaf7; }
body { font-family: 'Noto Sans JP', sans-serif; color: #1f241f; }
a { color: #1e6b3d; }
a:hover { color: #14522d; }
@media (max-width: 1000px) {
  [data-mq="explore-grid"] { grid-template-columns: 1fr !important; }
  [data-mq="filter-side"] { position: static !important; }
}
</style>
</helmet>
<dc-import name="SiteHeader" active="explore" hint-size="100%,64px"></dc-import>
<main data-screen-label="作品を探す" style="max-width: 1360px; margin: 0 auto; padding: 0 24px 64px;">

  <section style="padding: 44px 4px 32px;">
    <h1 style="font-size: 30px; font-weight: 900; letter-spacing: 0.02em; margin: 0 0 10px;">作品を探す</h1>
    <p style="font-size: 14.5px; line-height: 1.9; color: #3a3f39; margin: 0 0 24px;">キーワードやタグ、カテゴリーから学校のアーカイブを検索できます。</p>
    <div style="display: flex; gap: 12px; max-width: 720px;">
      <div style="flex: 1; display: flex; align-items: center; gap: 10px; background: #ffffff; border: 1px solid #cfd5c8; border-radius: 8px; padding: 0 14px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a9084" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
        <input value="{{ query }}" onChange="{{ setQuery }}" placeholder="作品名・制作者・キーワードで検索" style="flex: 1; border: none; outline: none; background: transparent; font-family: inherit; font-size: 14.5px; color: #1f241f; padding: 13px 0;">
      </div>
      <button onClick="{{ noop }}" style="background: #1e6b3d; color: #ffffff; border: none; font-family: inherit; font-size: 14.5px; font-weight: 700; padding: 0 30px; border-radius: 8px; cursor: pointer;" style-hover="background: #17552f;">検索</button>
    </div>
  </section>

  <div data-mq="explore-grid" style="display: grid; grid-template-columns: 264px minmax(0, 1fr); gap: 24px; align-items: start;">

    <aside data-mq="filter-side" style="position: sticky; top: 88px; display: flex; flex-direction: column; gap: 20px;">
      <section style="background: #ffffff; border: 1px solid #e6e6df; border-radius: 12px; padding: 20px;">
        <h2 style="font-size: 14px; font-weight: 700; margin: 0 0 14px; color: #3a3f39;">カテゴリー</h2>
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <sc-for list="{{ categories }}" as="cat" hint-placeholder-count="6">
            <button onClick="{{ cat.select }}" style="display: flex; align-items: center; justify-content: space-between; gap: 8px; border: none; background: {{ cat.bg }}; color: {{ cat.color }}; font-family: inherit; font-size: 13.5px; font-weight: {{ cat.weight }}; text-align: left; padding: 9px 12px; border-radius: 8px; cursor: pointer;" style-hover="background: #eef4ea;">
              <span>{{ cat.label }}</span>
              <span style="font-size: 12px; color: #8a9084;">{{ cat.count }}</span>
            </button>
          </sc-for>
        </div>
      </section>
      <section style="background: #ffffff; border: 1px solid #e6e6df; border-radius: 12px; padding: 20px;">
        <h2 style="font-size: 14px; font-weight: 700; margin: 0 0 14px; color: #3a3f39;">人気のタグ</h2>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <sc-for list="{{ tags }}" as="tag" hint-placeholder-count="10">
            <a href="#" style="text-decoration: none; font-size: 12.5px; font-weight: 500; color: #1e6b3d; background: #ffffff; border: 1px solid #cfd5c8; border-radius: 999px; padding: 6px 14px;" style-hover="background: #eef4ea; border-color: #1e6b3d;">{{ tag }}</a>
          </sc-for>
        </div>
      </section>
    </aside>

    <section style="background: #ffffff; border: 1px solid #e6e6df; border-radius: 12px; padding: 24px; min-height: 480px; display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px;">
        <p style="margin: 0; font-size: 13.5px; color: #6b7069;">{{ resultLabel }}</p>
        <div style="display: flex; align-items: center; gap: 8px;">
          <span style="font-size: 13px; color: #6b7069;">並び替え</span>
          <select value="{{ sort }}" onChange="{{ setSort }}" style="font-family: inherit; font-size: 13.5px; color: #1f241f; background: #ffffff; border: 1px solid #cfd5c8; border-radius: 8px; padding: 8px 12px; cursor: pointer;">
            <option value="new">新着順</option>
            <option value="likes">いいね数順</option>
            <option value="views">閲覧数順</option>
          </select>
        </div>
      </div>
      <sc-if value="{{ hasWorks }}" hint-placeholder-val="{{ false }}">
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px;">
          <sc-for list="{{ works }}" as="work" hint-placeholder-count="6">
            <article style="border: 1px solid #e6e6df; border-radius: 10px; overflow: hidden; background: #ffffff;">
              <div style="height: 160px; background: #eef4ea; background-image: {{ work.image }}; background-size: cover; background-position: center;"></div>
              <div style="padding: 16px;">
                <h2 style="font-size: 16px; line-height: 1.6; margin: 0 0 8px;">{{ work.title }}</h2>
                <p style="font-size: 12.5px; color: #6b7069; margin: 0 0 10px;">{{ work.author }}</p>
                <div style="display: flex; gap: 6px; flex-wrap: wrap;"><sc-for list="{{ work.tags }}" as="tag" hint-placeholder-count="2"><span style="font-size: 11.5px; color: #1e6b3d; background: #eef4ea; border-radius: 999px; padding: 4px 10px;">{{ tag }}</span></sc-for></div>
              </div>
            </article>
          </sc-for>
        </div>
      </sc-if>
      <sc-if value="{{ hasNoWorks }}" hint-placeholder-val="{{ true }}">
      <div style="flex: 1; border: 1.5px dashed #d5d8cd; border-radius: 10px; padding: 56px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a9c79a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="15" rx="2"></rect><circle cx="9" cy="10" r="2"></circle><path d="M3 17 L9 12 L14 16 L17 13 L21 17"></path></svg>
        <p style="margin: 0; font-size: 15px; font-weight: 700; color: #3a3f39;">まだ作品が投稿されていません</p>
        <p style="margin: 0; font-size: 13px; color: #6b7069; line-height: 1.8;">作品が投稿されると、ここに一覧で表示されます。<br>最初の作品を投稿してみませんか？</p>
        <a href="PostWork.dc.html" style="margin-top: 6px; text-decoration: none; background: #1e6b3d; color: #ffffff; font-size: 14px; font-weight: 700; padding: 10px 26px; border-radius: 8px;" style-hover="background: #17552f;">作品を投稿する</a>
      </div>
      </sc-if>
    </section>

  </div>
</main>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { query: '', sort: 'new', category: 'all', works: [], total: 0, error: '' };

  componentDidMount() { this.loadWorks(); }

  loadWorks() {
    window.kmApi.getWorks({ query: this.state.query, q: this.state.query, sort: this.state.sort, category: this.state.category })
      .then(result => this.setState({ works: result.works || [], total: result.total || 0, error: '' }))
      .catch(error => this.setState({ works: [], total: 0, error: error.message || '作品を読み込めませんでした。' }));
  }

  renderVals() {
    const cats = [
      ['all', 'すべて'], ['web', 'Web・アプリ'], ['game', 'ゲーム'], ['design', 'デザイン'],
      ['video', '映像・音楽'], ['product', 'プロダクト'], ['research', '研究・論文'], ['community', '地域活動']
    ];
    return {
      query: this.state.query,
      setQuery: (e) => this.setState({ query: e.target.value }),
      sort: this.state.sort,
      setSort: (e) => this.setState({ sort: e.target.value }, () => this.loadWorks()),
      noop: () => this.loadWorks(),
      resultLabel: this.state.error || (this.state.total + '件の作品'),
      hasWorks: this.state.works.length > 0,
      hasNoWorks: this.state.works.length === 0,
      works: this.state.works.map(work => ({
        title: work.title,
        image: work.images && work.images[0] ? 'url("' + work.images[0].imageUrl + '")' : 'none',
        author: work.author ? (work.author.lastName + ' ' + work.author.firstName) : '',
        tags: (work.workTags || []).slice(0, 4).map(item => item.tag.name)
      })),
      categories: cats.map(([key, label]) => ({
        label,
        count: 0,
        weight: this.state.category === key ? 700 : 500,
        color: this.state.category === key ? '#1e6b3d' : '#3a3f39',
        bg: this.state.category === key ? '#eef4ea' : 'transparent',
        select: () => this.setState({ category: key }, () => this.loadWorks())
      })),
      tags: ['Web', 'ゲーム', 'デザイン', '映像', 'プロダクト', '研究', '地域活動', '授業制作', 'アプリ', 'AI・データ']
    };
  }
}
</script>
</body>
</html>
