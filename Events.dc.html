<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./api.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; background: #fafaf7; }
body { font-family: 'Noto Sans JP', sans-serif; color: #1f241f; }
a { color: #1e6b3d; }
a:hover { color: #14522d; }
@media (max-width: 900px) {
  [data-mq="events-head"] { flex-direction: column !important; align-items: flex-start !important; }
}
</style>
</helmet>
<dc-import name="SiteHeader" active="events" hint-size="100%,64px"></dc-import>
<main data-screen-label="イベント" style="max-width: 1080px; margin: 0 auto; padding: 0 24px 64px;">

  <section data-mq="events-head" style="display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; padding: 44px 4px 28px;">
    <div>
      <h1 style="font-size: 30px; font-weight: 900; letter-spacing: 0.02em; margin: 0 0 10px;">イベント</h1>
      <p style="font-size: 14.5px; line-height: 1.9; color: #3a3f39; margin: 0;">展示会や作品募集、コンテストなど、学校で開催されるイベントの一覧です。</p>
    </div>
  </section>

  <div style="display: flex; gap: 8px; border-bottom: 1px solid #e6e6df; margin-bottom: 24px; padding: 0 4px;">
    <sc-for list="{{ tabs }}" as="tab" hint-placeholder-count="3">
      <button onClick="{{ tab.select }}" style="border: none; background: transparent; font-family: inherit; font-size: 14.5px; font-weight: {{ tab.weight }}; color: {{ tab.color }}; padding: 12px 18px 14px; border-bottom: 2px solid {{ tab.underline }}; cursor: pointer; margin-bottom: -1px;">{{ tab.label }}</button>
    </sc-for>
  </div>

  <sc-if value="{{ hasEvents }}" hint-placeholder-val="{{ false }}">
    <section style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
      <sc-for list="{{ events }}" as="event" hint-placeholder-count="3">
        <article style="background: #ffffff; border: 1px solid #e6e6df; border-radius: 12px; overflow: hidden;">
          <div style="height: 156px; background: #eef4ea; background-image: {{ event.thumbUrl }}; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;">
            <sc-if value="{{ event.noThumb }}" hint-placeholder-val="{{ true }}"><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#a9c79a" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg></sc-if>
          </div>
          <div style="padding: 18px;">
            <div style="display: flex; gap: 8px; margin-bottom: 10px;"><span style="font-size: 11.5px; font-weight: 700; color: {{ event.statusColor }}; background: {{ event.statusBg }}; border-radius: 999px; padding: 4px 10px;">{{ event.statusLabel }}</span><span style="font-size: 11.5px; color: #6b7069; padding: 4px 0;">{{ event.typeLabel }}</span></div>
            <h2 style="font-size: 17px; line-height: 1.6; margin: 0 0 10px;">{{ event.title }}</h2>
            <p style="font-size: 12.5px; color: #5a6055; line-height: 1.7; margin: 0;">{{ event.dateLabel }}<br>{{ event.place }}</p>
          </div>
        </article>
      </sc-for>
    </section>
  </sc-if>
  <sc-if value="{{ hasNoEvents }}" hint-placeholder-val="{{ true }}">
  <section style="background: #ffffff; border: 1px solid #e6e6df; border-radius: 12px; padding: 24px; min-height: 380px; display: flex; flex-direction: column;">
    <div style="flex: 1; border: 1.5px dashed #d5d8cd; border-radius: 10px; padding: 56px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#a9c79a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line><line x1="8" y1="3" x2="8" y2="7"></line><line x1="16" y1="3" x2="16" y2="7"></line></svg>
      <p style="margin: 0; font-size: 15px; font-weight: 700; color: #3a3f39;">{{ emptyTitle }}</p>
      <p style="margin: 0; font-size: 13px; color: #6b7069; line-height: 1.8;">{{ emptyBody }}</p>
    </div>
  </section>
  </sc-if>

  <section style="margin-top: 32px; background: #eef4ea; border-radius: 12px; padding: 28px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">
    <div>
      <h2 style="font-size: 16px; font-weight: 700; margin: 0 0 6px; color: #1f241f;">イベントの開催をお知らせしませんか？</h2>
      <p style="margin: 0; font-size: 13px; color: #3a3f39; line-height: 1.8;">展示会・作品募集・コンテストなどをこのページに掲載できます。</p>
    </div>
    <a href="https://forms.gle/HbGdXSwP5wZ6PeMz9" style="text-decoration: none; background: #1e6b3d; color: #ffffff; font-size: 14px; font-weight: 700; padding: 11px 28px; border-radius: 8px; white-space: nowrap;" style-hover="background: #17552f;">掲載を申し込む</a>
  </section>

</main>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab: 'now', events: [], loading: true, error: '' };

  componentDidMount() {
    window.kmApi.getEvents(false)
      .then(result => this.setState({ events: result.events || [], loading: false }))
      .catch(error => this.setState({ error: error.message || 'イベントを読み込めませんでした。', loading: false }));
  }

  renderVals() {
    const defs = [
      ['now', '開催中', '開催中のイベントはありません', '現在開催中の展示会や作品募集がここに表示されます。'],
      ['upcoming', '開催予定', '開催予定のイベントはありません', 'これから開催されるイベントがここに表示されます。'],
      ['past', '過去のイベント', '過去のイベントはありません', '終了したイベントの記録がここに表示されます。']
    ];
    const current = defs.find(d => d[0] === this.state.tab);
    const today = new Date().toISOString().slice(0, 10);
    const typeLabels = { EXHIBITION: '展示会', RECRUITMENT: '作品募集', CONTEST: 'コンテスト', OTHER: 'その他' };
    const filtered = this.state.events.filter(event => {
      const start = event.startAt ? event.startAt.slice(0, 10) : '';
      const end = event.endAt ? event.endAt.slice(0, 10) : '';
      if (this.state.tab === 'past') return !!end && end < today;
      if (this.state.tab === 'upcoming') return !!start && start > today;
      return (!start || start <= today) && (!end || end >= today);
    });
    return {
      tabs: defs.map(([key, label]) => ({
        label,
        weight: this.state.tab === key ? 700 : 500,
        color: this.state.tab === key ? '#1e6b3d' : '#3a3f39',
        underline: this.state.tab === key ? '#1e6b3d' : 'transparent',
        select: () => this.setState({ tab: key })
      })),
      emptyTitle: this.state.error || current[2],
      emptyBody: this.state.error ? '時間をおいて再度お試しください。' : current[3],
      hasEvents: filtered.length > 0,
      hasNoEvents: filtered.length === 0,
      events: filtered.map(event => {
        const start = event.startAt ? event.startAt.slice(0, 10) : '';
        const end = event.endAt ? event.endAt.slice(0, 10) : '';
        const status = end && end < today ? 'past' : start && start > today ? 'upcoming' : 'now';
        const statusDef = status === 'now' ? ['開催中', '#1e6b3d', '#e4efdd'] : status === 'upcoming' ? ['開催予定', '#8a5a1e', '#f6ead6'] : ['終了', '#6b7069', '#eeeee8'];
        return {
          title: event.title, place: event.place || '場所未定', typeLabel: typeLabels[event.type] || 'その他',
          thumbUrl: event.imageUrl ? 'url("' + event.imageUrl + '")' : 'none', noThumb: !event.imageUrl,
          dateLabel: (start || '日程未定') + (end && end !== start ? ' 〜 ' + end : ''),
          statusLabel: statusDef[0], statusColor: statusDef[1], statusBg: statusDef[2]
        };
      })
    };
  }
}
</script>
</body>
</html>
